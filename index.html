<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тести й картки</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg-color: #141416;
            --panel-color: #202024;
            --panel-soft: #27272D;
            --accent-color: #E08A8A;
            --accent-dark: #C97171;
            --text-main: #F2EEEE;
            --text-muted: #B9B1B1;
            --white: #202024;
            --good: #74C787;
            --bad: #E46D6D;
            --line: rgba(224, 138, 138, 0.28);
            --shadow: rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app {
            width: min(860px, 100%);
            margin: 0 auto;
            padding: 28px 18px 44px;
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 38px;
        }

        .brand {
            display: grid;
            gap: 10px;
        }

        .eyebrow {
            color: var(--accent-color);
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1 {
            max-width: 700px;
            font-size: 42px;
            line-height: 1.12;
            letter-spacing: 0;
        }

        .muted {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .icon-button {
            width: 54px;
            height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background-color: var(--accent-color);
            color: var(--white);
            cursor: pointer;
            font-size: 24px;
            font-weight: 700;
            transition: transform 0.1s ease, background-color 0.1s ease;
        }

        .icon-button:hover {
            transform: translateY(-1px);
            background-color: var(--accent-dark);
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .menu-button,
        .answer-item,
        .action-button,
        .ghost-button,
        .card-shell,
        .form-panel,
        .wrong-item {
            background-color: var(--white);
        }

        .menu-button {
            min-height: 132px;
            display: flex;
            align-items: stretch;
            cursor: pointer;
            text-align: left;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .menu-button:hover,
        .answer-item:hover,
        .ghost-button:hover,
        .action-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 22px var(--shadow);
        }

        .menu-mark {
            width: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background-color: var(--accent-color);
            color: var(--white);
            font-size: 22px;
            font-weight: 700;
        }

        .menu-copy {
            display: grid;
            align-content: center;
            gap: 8px;
            padding: 20px;
        }

        .menu-title {
            color: var(--text-main);
            font-size: 22px;
            font-weight: 700;
        }

        .menu-note {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.35;
        }

        .screen-header,
        .quiz-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 34px;
        }

        .back-button {
            color: var(--accent-color);
            background: transparent;
            cursor: pointer;
            font-weight: 700;
            text-align: left;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .question-number,
        .score-label {
            color: var(--text-main);
            font-size: 17px;
            font-weight: 600;
        }

        .progress-bar {
            width: 180px;
            height: 34px;
            border: 2px solid var(--accent-color);
            background-color: transparent;
            position: relative;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.2s ease;
        }

        .score-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-value {
            color: var(--accent-color);
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
        }

        .question-text {
            max-width: 720px;
            margin-bottom: 36px;
            font-size: 38px;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .answer-item {
            width: 100%;
            min-height: 55px;
            display: flex;
            cursor: pointer;
            text-align: left;
            transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.1s ease;
        }

        .answer-item:disabled {
            cursor: default;
            opacity: 0.88;
        }

        .answer-letter {
            width: 55px;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background-color: var(--accent-color);
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
        }

        .answer-item.correct .answer-letter {
            background-color: var(--good);
        }

        .answer-item.wrong .answer-letter {
            background-color: var(--bad);
        }

        .answer-text {
            display: flex;
            align-items: center;
            min-width: 0;
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .result-panel,
        .empty-state {
            display: grid;
            gap: 18px;
            padding: 28px;
            background-color: var(--white);
        }

        .result-title {
            color: var(--accent-color);
            font-size: 42px;
            font-weight: 700;
        }

        .actions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-button,
        .ghost-button {
            min-height: 48px;
            padding: 0 18px;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 700;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease;
        }

        .action-button {
            background-color: var(--accent-color);
            color: var(--white);
        }

        .ghost-button {
            border: 2px solid var(--accent-color);
            background-color: transparent;
            color: var(--accent-color);
        }

        .quiz-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
        }

        .card-shell {
            min-height: 290px;
            display: grid;
            align-items: center;
            padding: 34px;
            cursor: pointer;
            text-align: left;
        }

        .card-kicker {
            color: var(--accent-color);
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-text {
            margin-top: 18px;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.35;
            overflow-wrap: anywhere;
            white-space: pre-line;
        }

        .card-controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 16px;
        }

        .settings-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-panel {
            display: grid;
            gap: 14px;
            padding: 22px;
        }

        .form-panel h2 {
            font-size: 24px;
            line-height: 1.2;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            border: 2px solid transparent;
            background-color: var(--panel-soft);
            color: var(--text-main);
            padding: 12px;
            outline: none;
            font-size: 15px;
        }

        .field textarea {
            min-height: 76px;
            resize: vertical;
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            border-color: var(--accent-color);
        }

        .list-stack {
            display: grid;
            gap: 10px;
            max-height: 310px;
            overflow: auto;
            padding-right: 4px;
        }

        .data-row,
        .wrong-item {
            display: grid;
            gap: 8px;
            padding: 14px;
            border: 1px solid var(--line);
            background-color: var(--panel-soft);
        }

        .data-row-title,
        .wrong-question {
            font-weight: 700;
            line-height: 1.35;
        }

        .row-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .small-button {
            min-height: 34px;
            padding: 0 10px;
            background-color: var(--accent-color);
            color: var(--white);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }

        .small-button.secondary {
            border: 1px solid var(--accent-color);
            background-color: transparent;
            color: var(--accent-color);
        }

        .hidden {
            display: none !important;
        }

        .status-line {
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.45;
        }

        .wrong-list {
            display: grid;
            gap: 12px;
        }

        .wrong-meta {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.48);
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal {
            width: min(480px, 100%);
            display: grid;
            gap: 16px;
            padding: 26px;
            background-color: var(--white);
            box-shadow: 0 18px 50px var(--shadow);
        }

        .modal-title {
            color: var(--bad);
            font-size: 34px;
            font-weight: 700;
            line-height: 1.1;
        }

        #cursorSmoke {
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        @media (max-width: 720px) {
            body {
                padding: 14px;
            }

            .app {
                padding: 18px 0 34px;
            }

            .topbar,
            .screen-header,
            .quiz-header {
                margin-bottom: 28px;
            }

            h1 {
                font-size: 32px;
            }

            .menu-grid,
            .settings-layout {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 27px;
            }

            .card-text {
                font-size: 19px;
            }

            .progress-bar {
                width: 140px;
                height: 28px;
            }

            .score-value {
                font-size: 48px;
            }

            .card-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <canvas id="cursorSmoke" aria-hidden="true"></canvas>

    <div class="app">
        <section class="view active" id="menuView">
            <header class="topbar">
                <div class="brand">
                    <div class="eyebrow">Тести й картки</div>
                    <h1>Тести й картки для повторення</h1>
                    <p class="muted">god bless you!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!</p>
                </div>
                <button class="icon-button" type="button" data-view="settingsView" title="Налаштування">⚙</button>
            </header>

            <div class="menu-grid">
                <button class="menu-button" type="button" data-start="quiz">
                    <span class="menu-mark">T</span>
                    <span class="menu-copy">
                        <span class="menu-title">Тест</span>
                        <span class="menu-note">Проходь питання, набирай бали й зберігай помилки.</span>
                    </span>
                </button>
                <button class="menu-button" type="button" data-view="cardsView">
                    <span class="menu-mark">C</span>
                    <span class="menu-copy">
                        <span class="menu-title">Картки</span>
                        <span class="menu-note">Перевертай картки й відмічай те, що вже знаєш.</span>
                    </span>
                </button>
                <button class="menu-button" type="button" data-view="wrongView">
                    <span class="menu-mark">!</span>
                    <span class="menu-copy">
                        <span class="menu-title">Де помилився</span>
                        <span class="menu-note">Переглядай питання, у яких були неправильні відповіді.</span>
                    </span>
                </button>
                <button class="menu-button" type="button" data-view="settingsView">
                    <span class="menu-mark">⚙</span>
                    <span class="menu-copy">
                        <span class="menu-title">Заповнення</span>
                        <span class="menu-note">Окремо додавай тести й окремо картки.</span>
                    </span>
                </button>
            </div>
            <p class="status-line" id="syncStatus"></p>
        </section>

        <section class="view" id="quizView">
            <header class="quiz-header">
                <div class="progress-section">
                    <button class="back-button" type="button" data-view="menuView">← Меню</button>
                    <div class="question-number" id="questionNumber">Питання 1/1</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="score-section">
                    <div class="score-label">Бали</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
            </header>

            <main id="quizContent"></main>
        </section>

        <section class="view" id="cardsView">
            <header class="screen-header">
                <div>
                    <button class="back-button" type="button" data-view="menuView">← Меню</button>
                    <h1>Картки</h1>
                </div>
                <button class="icon-button" type="button" data-view="settingsView" title="Налаштування">⚙</button>
            </header>
            <main id="cardsContent"></main>
        </section>

        <section class="view" id="wrongView">
            <header class="screen-header">
                <div>
                    <button class="back-button" type="button" data-view="menuView">← Меню</button>
                    <h1>Де помилився</h1>
                </div>
                <button class="ghost-button" type="button" id="clearWrongBtn">Очистити</button>
            </header>
            <main id="wrongContent"></main>
        </section>

        <section class="view" id="settingsView">
            <header class="screen-header">
                <div>
                    <button class="back-button" type="button" data-view="menuView">← Меню</button>
                    <h1>Заповнення</h1>
                    <p class="muted">Додавання тестів і карток розділено. Дані одразу зберігаються локально.</p>
                </div>
            </header>

            <div class="settings-layout">
                <form class="form-panel" id="quizForm">
                    <h2>Новий тест</h2>
                    <input type="hidden" id="questionEditId">
                    <div class="field">
                        <label for="questionInput">Питання</label>
                        <textarea id="questionInput" required placeholder="Наприклад: Що означає CSS?"></textarea>
                    </div>
                    <div class="field">
                        <label for="answersInput">Варіанти через новий рядок</label>
                        <textarea id="answersInput" required placeholder="Counter Strike: Source&#10;Corrective Style Sheet&#10;Computer Style Sheet&#10;Каскадні таблиці стилів"></textarea>
                    </div>
                    <div class="field">
                        <label for="correctInput">Правильна відповідь</label>
                        <select id="correctInput">
                            <option value="0">A</option>
                            <option value="1">B</option>
                            <option value="2">C</option>
                            <option value="3">D</option>
                        </select>
                    </div>
                    <div class="actions-row">
                        <button class="action-button" type="submit" id="questionSubmitBtn">Додати тест</button>
                        <button class="ghost-button hidden" type="button" id="cancelQuestionEditBtn">Скасувати</button>
                    </div>
                    <div class="list-stack" id="questionsList"></div>
                </form>

                <form class="form-panel" id="cardForm">
                    <h2>Нова картка</h2>
                    <input type="hidden" id="cardEditId">
                    <div class="field">
                        <label for="frontInput">Передня сторона</label>
                        <textarea id="frontInput" required placeholder="Термін або питання"></textarea>
                    </div>
                    <div class="field">
                        <label for="backInput">Задня сторона</label>
                        <textarea id="backInput" required placeholder="Відповідь або пояснення"></textarea>
                    </div>
                    <div class="actions-row">
                        <button class="action-button" type="submit" id="cardSubmitBtn">Додати картку</button>
                        <button class="ghost-button hidden" type="button" id="cancelCardEditBtn">Скасувати</button>
                    </div>
                    <div class="list-stack" id="cardsList"></div>
                </form>
            </div>
        </section>
    </div>

    <div class="modal-backdrop" id="wrongModal" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="wrongModalTitle">
            <div class="modal-title" id="wrongModalTitle">Неправильно</div>
            <p class="muted" id="wrongModalText"></p>
            <button class="action-button" type="button" id="wrongModalBtn">Продовжити</button>
        </div>
    </div>

        function init() {
            initParticles();
            setupSupabase();

            pullFromSupabase();

        function initParticles() {
            const canvas = document.getElementById('cursorSmoke');
            const context = canvas.getContext('2d');
            const pointer = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false, lastMove: 0 };
            const particles = [];

            cursorSmoke = { canvas, context, pointer, particles };
            resizeSmokeCanvas();

            window.addEventListener('resize', resizeSmokeCanvas);
            window.addEventListener('mousemove', (event) => {
                pointer.x = event.clientX;
                pointer.y = event.clientY;
                pointer.active = true;
                pointer.lastMove = performance.now();
            }, { passive: true });
            window.addEventListener('touchmove', (event) => {
                const touch = event.touches[0];
                if (!touch) return;
                pointer.x = touch.clientX;
                pointer.y = touch.clientY;
                pointer.active = true;
                pointer.lastMove = performance.now();
            }, { passive: true });

            requestAnimationFrame(drawSmoke);
        }

        function resizeSmokeCanvas() {
            if (!cursorSmoke) return;

            const ratio = window.devicePixelRatio || 1;
            cursorSmoke.canvas.width = Math.floor(window.innerWidth * ratio);
            cursorSmoke.canvas.height = Math.floor(window.innerHeight * ratio);
            cursorSmoke.canvas.style.width = `${window.innerWidth}px`;
            cursorSmoke.canvas.style.height = `${window.innerHeight}px`;
            cursorSmoke.context.setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function spawnSmokeParticles(amount) {
            if (!cursorSmoke) return;

            for (let index = 0; index < amount; index += 1) {
                cursorSmoke.particles.push({
                    x: cursorSmoke.pointer.x,
                    y: cursorSmoke.pointer.y,
                    vx: randomGaussian() * 2.2,
                    vy: randomGaussian(-0.45, 0.8),
                    ax: 0,
                    ay: 0,
                    diameter: 18 + Math.random() * 30,
                    life: 38,
                    alpha: 0.68,
                    red: Math.floor(Math.random() * 255),
                    green: Math.floor(Math.random() * 255),
                    blue: Math.floor(Math.random() * 255)
                });
            }

            if (cursorSmoke.particles.length > 140) {
                cursorSmoke.particles.splice(0, cursorSmoke.particles.length - 140);
            }
        }

        function drawSmoke() {
            if (!cursorSmoke) return;

            const { context, particles, pointer } = cursorSmoke;
            context.clearRect(0, 0, window.innerWidth, window.innerHeight);
            context.globalCompositeOperation = 'lighter';

            pointer.active = performance.now() - pointer.lastMove < 90;

            if (pointer.active) {
                spawnSmokeParticles(2);
            }

            for (let index = particles.length - 1; index >= 0; index -= 1) {
                const particle = particles[index];
                const dx = pointer.x - particle.x;
                const dy = pointer.y - particle.y;
                const distance = Math.hypot(dx, dy) || 1;

                particle.ax += (dx / distance) * 0.5;
                particle.ay += -0.08 + (dy / distance) * 0.03;
                particle.vx += particle.ax / Math.max(particle.diameter / 200, 0.1);
                particle.vy += particle.ay / Math.max(particle.diameter / 200, 0.1);
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= 2.2;
                particle.alpha = Math.max(0, particle.alpha - 0.035);
                particle.ax = 0;
                particle.ay = 0;

                drawSmokeParticle(particle);

                if (particle.life <= 0 || particle.alpha <= 0) {
                    particles.splice(index, 1);
                }
            }

            context.globalCompositeOperation = 'source-over';
            requestAnimationFrame(drawSmoke);
        }

        function drawSmokeParticle(particle) {
            const radius = particle.diameter / 2;
            const gradient = cursorSmoke.context.createRadialGradient(
                particle.x,
                particle.y,
                0,
                particle.x,
                particle.y,
                radius
            );

            gradient.addColorStop(0, `rgba(${particle.red}, ${particle.green}, ${particle.blue}, ${particle.alpha})`);
            gradient.addColorStop(0.42, `rgba(${particle.red}, ${particle.green}, ${particle.blue}, ${particle.alpha * 0.45})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            cursorSmoke.context.fillStyle = gradient;
            cursorSmoke.context.beginPath();
            cursorSmoke.context.arc(particle.x, particle.y, radius, 0, Math.PI * 2);
            cursorSmoke.context.fill();
        }

        function randomGaussian(mean = 0, deviation = 1) {
            let first = 0;
            let second = 0;

            while (first === 0) first = Math.random();
            while (second === 0) second = Math.random();

            const gaussian = Math.sqrt(-2 * Math.log(first)) * Math.cos(2 * Math.PI * second);
            return gaussian * deviation + mean;
        }

        function setupSupabase() {
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) {
                
                return;
            }

            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
        }

        function bindEvents() {
            document.querySelectorAll('[data-view]').forEach((button) => {
                button.addEventListener('click', () => showView(button.dataset.view));
            });

            document.querySelector('[data-start="quiz"]').addEventListener('click', startQuiz);
            document.getElementById('quizForm').addEventListener('submit', addQuestion);
            document.getElementById('cardForm').addEventListener('submit', addCard);
            document.getElementById('clearWrongBtn').addEventListener('click', clearWrongAnswers);
            document.getElementById('wrongModalBtn').addEventListener('click', closeWrongModal);
            document.getElementById('cancelQuestionEditBtn').addEventListener('click', resetQuestionForm);
            document.getElementById('cancelCardEditBtn').addEventListener('click', resetCardForm);
        }

        function showView(viewId) {
            views.forEach((view) => view.classList.toggle('active', view.id === viewId));

            if (viewId === 'cardsView') renderCards();
            if (viewId === 'wrongView') renderWrongAnswers();
            if (viewId === 'settingsView') renderSettings();
        }

        function loadState() {
            try {
                const cached = localStorage.getItem(STORAGE_KEY);
                return normalizeState(cached ? JSON.parse(cached) : structuredClone(defaultState));
            } catch {
                return normalizeState(structuredClone(defaultState));
            }
        }

        function normalizeState(nextState) {
            if (nextState.contentVersion !== PDF_CONTENT_VERSION) {
                return structuredClone(defaultState);
            }

            nextState.progress ||= {};
            nextState.progress.totalAnswered ||= 0;
            nextState.progress.totalCorrect ||= 0;
            nextState.progress.knownCards ||= [];
            nextState.progress.wrongAnswers ||= [];

            nextState.questions?.forEach((item) => {
                if (item.question === 'In web design, what does CSS stand for?') {
                    item.question = 'Що означає CSS у вебдизайні?';
                    item.answers = ['Counter Strike: Source', 'Corrective Style Sheet', 'Computer Style Sheet', 'Каскадні таблиці стилів'];
                    item.correctIndex = 3;
                }

                if (item.question === 'Какой тег создает самый важный заголовок на странице?') {
                    item.question = 'Який тег створює найважливіший заголовок на сторінці?';
                }
            });

            nextState.cards?.forEach((item) => {
                if (item.back === 'Cascading Style Sheets: язык стилей для оформления HTML.') {
                    item.back = 'Cascading Style Sheets: мова стилів для оформлення HTML.';
                }

                if (item.back === 'Хранилище браузера, где данные остаются после закрытия вкладки.') {
                    item.back = 'Сховище браузера, де дані залишаються після закриття вкладки.';
                }
            });

            return nextState;
        }

        function getUserId() {
            let id = localStorage.getItem(USER_ID_KEY);
            if (!id) {
                id = crypto.randomUUID();
                localStorage.setItem(USER_ID_KEY, id);
            }
            return id;
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            pushToSupabase();
            renderSettings();
            renderCards();
            renderWrongAnswers();
        }

        function renderAll() {
            renderSettings();
            renderCards();
            renderWrongAnswers();
        }

        function startQuiz() {
            quizSession = {
                index: 0,
                order: state.questions.map((_, index) => index),
                answers: Array(state.questions.length).fill(null)
            };
            showView('quizView');
            renderQuiz();
        }

        function renderQuiz() {
            const content = document.getElementById('quizContent');
            const total = state.questions.length;

            if (!total) {
                document.getElementById('questionNumber').textContent = 'Питань немає';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('scoreValue').textContent = '0';
                content.innerHTML = emptyHtml('Тестів поки немає', 'Відкрий шестерню й додай перше питання.');
                return;
            }

            if (quizSession.index >= total) {
                const score = quizSession.answers.filter((answer) => answer?.isCorrect).length;
                document.getElementById('questionNumber').textContent = `Готово ${total}/${total}`;
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('scoreValue').textContent = String(score);
                content.innerHTML = `
                    <div class="result-panel">
                        <div class="result-title">${score}/${total}</div>
                        <p class="muted">Тест завершено. Помилки вже збережені в пункті "Де помилився".</p>
                        <div class="actions-row">
                            <button class="action-button" type="button" id="restartQuizBtn">Пройти знову</button>
                            <button class="ghost-button" type="button" data-view="menuView">У меню</button>
                        </div>
                    </div>
                `;
                document.getElementById('restartQuizBtn').addEventListener('click', startQuiz);
                content.querySelector('[data-view="menuView"]').addEventListener('click', () => showView('menuView'));
                return;
            }

            const questionIndex = quizSession.order[quizSession.index] ?? quizSession.index;
            const current = state.questions[questionIndex];
            const currentAnswer = quizSession.answers[quizSession.index];
            const score = quizSession.answers.filter((answer) => answer?.isCorrect).length;
            document.getElementById('questionNumber').textContent = `Питання ${quizSession.index + 1}/${total}`;
            document.getElementById('progressFill').style.width = `${((quizSession.index + 1) / total) * 100}%`;
            document.getElementById('scoreValue').textContent = String(score);
            content.innerHTML = `
                <h2 class="question-text">${escapeHtml(current.question)}</h2>
                <div class="answers-list">
                    ${current.answers.map((answer, index) => `
                        <button class="answer-item ${answerClass(index, current, currentAnswer)}" type="button" data-answer="${index}" ${currentAnswer ? 'disabled' : ''}>
                            <span class="answer-letter">${String.fromCharCode(65 + index)}</span>
                            <span class="answer-text">${escapeHtml(answer)}</span>
                        </button>
                    `).join('')}
                </div>
                <div class="quiz-controls">
                    <button class="ghost-button" type="button" id="prevQuestionBtn" ${quizSession.index === 0 ? 'disabled' : ''}>Повернутись</button>
                    <button class="action-button" type="button" id="nextQuestionBtn">${quizSession.index === total - 1 ? 'Завершити' : 'Наступний'}</button>
                    <button class="ghost-button" type="button" id="shuffleQuizBtn">Перемішати тест</button>
                </div>
            `;

            content.querySelectorAll('[data-answer]').forEach((button) => {
                button.addEventListener('click', () => answerQuestion(Number(button.dataset.answer)));
            });
            document.getElementById('prevQuestionBtn').addEventListener('click', previousQuestion);
            document.getElementById('nextQuestionBtn').addEventListener('click', nextQuestion);
            document.getElementById('shuffleQuizBtn').addEventListener('click', shuffleQuiz);
        }

        function answerClass(index, question, answer) {
            if (!answer) return '';
            if (index === question.correctIndex) return 'correct';
            if (index === answer.selectedIndex && !answer.isCorrect) return 'wrong';
            return '';
        }

        function answerQuestion(answerIndex) {
            if (quizSession.answers[quizSession.index]) return;

            const questionIndex = quizSession.order[quizSession.index] ?? quizSession.index;
            const current = state.questions[questionIndex];
            const isCorrect = answerIndex === current.correctIndex;
            quizSession.answers[quizSession.index] = { selectedIndex: answerIndex, isCorrect };

            if (isCorrect) {
                state.progress.totalCorrect += 1;
            } else {
                rememberWrongAnswer(current, answerIndex);
            }

            state.progress.totalAnswered += 1;
            document.querySelectorAll('[data-answer]').forEach((button) => {
                const index = Number(button.dataset.answer);
                button.disabled = true;
                if (index === current.correctIndex) button.classList.add('correct');
                if (index === answerIndex && !isCorrect) button.classList.add('wrong');
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            pushToSupabase();

            if (isCorrect) {
                renderQuiz();
                setTimeout(nextQuestion, 550);
                return;
            }

            showWrongModal(current.answers[current.correctIndex], current.answers[answerIndex] || '');
            renderQuiz();
        }

        function nextQuestion() {
            if (quizSession.index >= state.questions.length - 1) {
                quizSession.index = state.questions.length;
                renderQuiz();
                return;
            }

            quizSession.index += 1;
            renderQuiz();
        }

        function previousQuestion() {
            if (quizSession.index <= 0) return;
            quizSession.index -= 1;
            renderQuiz();
        }

        function shuffleQuiz() {
            quizSession.order = shuffleArray(state.questions.map((_, index) => index));
            quizSession.index = 0;
            quizSession.answers = Array(state.questions.length).fill(null);
            renderQuiz();
        }

        function shuffleArray(items) {
            const result = [...items];
            for (let index = result.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                [result[index], result[randomIndex]] = [result[randomIndex], result[index]];
            }
            return result;
        }

        function showWrongModal(correctAnswer, selectedAnswer) {
            const modal = document.getElementById('wrongModal');
            document.getElementById('wrongModalText').textContent = `Твоя відповідь: ${selectedAnswer}. Правильна відповідь: ${correctAnswer}.`;
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
            document.getElementById('wrongModalBtn').focus();
        }

        function closeWrongModal() {
            const modal = document.getElementById('wrongModal');
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
        }

        function rememberWrongAnswer(question, answerIndex) {
            const record = {
                id: crypto.randomUUID(),
                questionId: question.id,
                question: question.question,
                selected: question.answers[answerIndex] || '',
                correct: question.answers[question.correctIndex] || '',
                createdAt: new Date().toISOString()
            };

            state.progress.wrongAnswers = [
                record,
                ...state.progress.wrongAnswers.filter((item) => item.questionId !== question.id)
            ].slice(0, 30);
        }

        function renderCards() {
            const content = document.getElementById('cardsContent');

            if (!state.cards.length) {
                content.innerHTML = emptyHtml('Карток поки немає', 'Відкрий шестерню й додай першу картку.');
                return;
            }

            if (cardSession.index >= state.cards.length) cardSession.index = 0;
            const card = state.cards[cardSession.index];
            const isKnown = state.progress.knownCards.includes(card.id);

            content.innerHTML = `
                <div class="card-shell" id="flashCard" role="button" tabindex="0">
                    <div>
                        <div class="card-kicker">${cardSession.flipped ? 'Відповідь' : 'Картка'} ${cardSession.index + 1}/${state.cards.length}</div>
                        <div class="card-text">${escapeHtml(cardSession.flipped ? card.back : card.front)}</div>
                    </div>
                </div>
                <div class="card-controls">
                    <button class="ghost-button" type="button" id="prevCardBtn">Назад</button>
                    <button class="action-button" type="button" id="knownCardBtn">${isKnown ? 'Вже знаю' : 'Знаю'}</button>
                    <button class="ghost-button" type="button" id="nextCardBtn">Далі</button>
                </div>
                <p class="status-line">Натисни на картку, щоб перевернути. Відомо: ${state.progress.knownCards.length}/${state.cards.length}</p>
            `;

            document.getElementById('flashCard').addEventListener('click', flipCard);
            document.getElementById('flashCard').addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') flipCard();
            });
            document.getElementById('prevCardBtn').addEventListener('click', () => moveCard(-1));
            document.getElementById('nextCardBtn').addEventListener('click', () => moveCard(1));
            document.getElementById('knownCardBtn').addEventListener('click', markKnownCard);
        }

        function flipCard() {
            cardSession.flipped = !cardSession.flipped;
            renderCards();
        }

        function moveCard(direction) {
            cardSession.index = (cardSession.index + direction + state.cards.length) % state.cards.length;
            cardSession.flipped = false;
            renderCards();
        }

        function markKnownCard() {
            const card = state.cards[cardSession.index];
            if (!state.progress.knownCards.includes(card.id)) {
                state.progress.knownCards.push(card.id);
                saveState();
            }
            moveCard(1);
        }

        function renderWrongAnswers() {
            const content = document.getElementById('wrongContent');
            const wrong = state.progress.wrongAnswers;

            if (!wrong.length) {
                content.innerHTML = emptyHtml('Помилок поки немає', 'Після неправильної відповіді питання зʼявиться тут.');
                return;
            }

            content.innerHTML = `
                <div class="wrong-list">
                    ${wrong.map((item) => `
                        <article class="wrong-item">
                            <div class="wrong-question">${escapeHtml(item.question)}</div>
                            <div class="wrong-meta">Твоя відповідь: ${escapeHtml(item.selected)}</div>
                            <div class="wrong-meta">Правильно: ${escapeHtml(item.correct)}</div>
                        </article>
                    `).join('')}
                </div>
            `;
        }

        function clearWrongAnswers() {
            state.progress.wrongAnswers = [];
            saveState();
        }

        function addQuestion(event) {
            event.preventDefault();
            const questionInput = document.getElementById('questionInput');
            const answersInput = document.getElementById('answersInput');
            const correctInput = document.getElementById('correctInput');
            const answers = answersInput.value.split('\n').map((item) => item.trim()).filter(Boolean);

            if (answers.length < 2) {
                alert('Додай хоча б два варіанти відповіді.');
                return;
            }

            const correctIndex = Number(correctInput.value);
            if (correctIndex >= answers.length) {
                alert('Обрана правильна відповідь має існувати у списку варіантів.');
                return;
            }

            const editId = document.getElementById('questionEditId').value;
            if (editId) {
                const question = state.questions.find((item) => item.id === editId);
                if (question) {
                    question.question = questionInput.value.trim();
                    question.answers = answers;
                    question.correctIndex = correctIndex;
                }
            } else {
                state.questions.push({
                    id: crypto.randomUUID(),
                    question: questionInput.value.trim(),
                    answers,
                    correctIndex
                });
            }

            resetQuestionForm();
            saveState();
        }

        function addCard(event) {
            event.preventDefault();
            const editId = document.getElementById('cardEditId').value;
            if (editId) {
                const card = state.cards.find((item) => item.id === editId);
                if (card) {
                    card.front = document.getElementById('frontInput').value.trim();
                    card.back = document.getElementById('backInput').value.trim();
                }
            } else {
                state.cards.push({
                    id: crypto.randomUUID(),
                    front: document.getElementById('frontInput').value.trim(),
                    back: document.getElementById('backInput').value.trim()
                });
            }

            resetCardForm();
            saveState();
        }

        function renderSettings() {
            document.getElementById('questionsList').innerHTML = state.questions.map((item, index) => `
                <article class="data-row">
                    <div class="data-row-title">${index + 1}. ${escapeHtml(item.question)}</div>
                    <p class="muted">Відповідь: ${escapeHtml(item.answers[item.correctIndex] || '')}</p>
                    <div class="row-actions">
                        <button class="small-button secondary" type="button" data-edit-question="${item.id}">Редагувати</button>
                        <button class="small-button" type="button" data-delete-question="${item.id}">Видалити</button>
                    </div>
                </article>
            `).join('');

            document.getElementById('cardsList').innerHTML = state.cards.map((item, index) => `
                <article class="data-row">
                    <div class="data-row-title">${index + 1}. ${escapeHtml(item.front)}</div>
                    <p class="muted">${escapeHtml(item.back)}</p>
                    <div class="row-actions">
                        <button class="small-button secondary" type="button" data-edit-card="${item.id}">Редагувати</button>
                        <button class="small-button" type="button" data-delete-card="${item.id}">Видалити</button>
                    </div>
                </article>
            `).join('');

            document.querySelectorAll('[data-edit-question]').forEach((button) => {
                button.addEventListener('click', () => editQuestion(button.dataset.editQuestion));
            });
            document.querySelectorAll('[data-delete-question]').forEach((button) => {
                button.addEventListener('click', () => deleteQuestion(button.dataset.deleteQuestion));
            });
            document.querySelectorAll('[data-edit-card]').forEach((button) => {
                button.addEventListener('click', () => editCard(button.dataset.editCard));
            });
            document.querySelectorAll('[data-delete-card]').forEach((button) => {
                button.addEventListener('click', () => deleteCard(button.dataset.deleteCard));
            });
        }

        function editQuestion(id) {
            const question = state.questions.find((item) => item.id === id);
            if (!question) return;

            document.getElementById('questionEditId').value = question.id;
            document.getElementById('questionInput').value = question.question;
            document.getElementById('answersInput').value = question.answers.join('\n');
            document.getElementById('correctInput').value = String(question.correctIndex);
            document.getElementById('questionSubmitBtn').textContent = 'Зберегти тест';
            document.getElementById('cancelQuestionEditBtn').classList.remove('hidden');
            document.getElementById('questionInput').focus();
        }

        function editCard(id) {
            const card = state.cards.find((item) => item.id === id);
            if (!card) return;

            document.getElementById('cardEditId').value = card.id;
            document.getElementById('frontInput').value = card.front;
            document.getElementById('backInput').value = card.back;
            document.getElementById('cardSubmitBtn').textContent = 'Зберегти картку';
            document.getElementById('cancelCardEditBtn').classList.remove('hidden');
            document.getElementById('frontInput').focus();
        }

        function resetQuestionForm() {
            document.getElementById('quizForm').reset();
            document.getElementById('questionEditId').value = '';
            document.getElementById('questionSubmitBtn').textContent = 'Додати тест';
            document.getElementById('cancelQuestionEditBtn').classList.add('hidden');
        }

        function resetCardForm() {
            document.getElementById('cardForm').reset();
            document.getElementById('cardEditId').value = '';
            document.getElementById('cardSubmitBtn').textContent = 'Додати картку';
            document.getElementById('cancelCardEditBtn').classList.add('hidden');
        }

        function deleteQuestion(id) {
            state.questions = state.questions.filter((item) => item.id !== id);
            state.progress.wrongAnswers = state.progress.wrongAnswers.filter((item) => item.questionId !== id);
            saveState();
        }

        function deleteCard(id) {
            state.cards = state.cards.filter((item) => item.id !== id);
            state.progress.knownCards = state.progress.knownCards.filter((item) => item !== id);
            saveState();
            renderCards();
        }

        async function pullFromSupabase() {
            if (!supabaseClient) return;

            const { data, error } = await supabaseClient
                .from('quiz_app_state')
                .select('payload')
                .eq('id', userId)
                .maybeSingle();

            if (error) {
                syncStatus.textContent = formatSupabaseError('читання', error);
                return;
            }

            if (data?.payload) {
                state = normalizeState(data.payload);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                renderAll();
            }
        }

        async function pushToSupabase() {
            if (!supabaseClient) return;

            const { error } = await supabaseClient
                .from('quiz_app_state')
                .upsert({ id: userId, payload: state, updated_at: new Date().toISOString() });

            if (error) syncStatus.textContent = formatSupabaseError('запису', error);
        }

        function formatSupabaseError(action, error) {
            if (error.message.includes("quiz_app_state")) {
                return `Помилка ${action} Supabase: таблицю quiz_app_state не знайдено. Запусти SQL із файлу supabase_setup.sql у Supabase SQL Editor.`;
            }

            return `Помилка ${action} Supabase: ${error.message}`;
        }

        function emptyHtml(title, text) {
            return `
                <div class="empty-state">
                    <div class="result-title">${escapeHtml(title)}</div>
                    <p class="muted">${escapeHtml(text)}</p>
                    <div class="actions-row">
                        <button class="action-button" type="button" data-view="settingsView">Відкрити заповнення</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        document.addEventListener('click', (event) => {
            const button = event.target.closest('[data-view]');
            if (button) showView(button.dataset.view);
        });
    </script>
